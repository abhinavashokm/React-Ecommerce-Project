<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bazaar • OLX-style Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');

    .tail-container {
      font-family: 'Inter', system_ui, sans-serif;
    }

    .hero-bg {
      background: linear-gradient(135deg, #f97316, #ea580c);
    }

    .product-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    .modal {
      animation: modalPop 0.3s ease forwards;
    }

    @keyframes modalPop {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .nav-link {
      position: relative;
    }

    .nav-link:after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -2px;
      left: 0;
      background-color: #f97316;
      transition: width 0.3s;
    }

    .nav-link:hover:after {
      width: 100%;
    }
  </style>
</head>

<body class="tail-container bg-zinc-50 text-zinc-900">
  <div  class=" mx-auto" id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
